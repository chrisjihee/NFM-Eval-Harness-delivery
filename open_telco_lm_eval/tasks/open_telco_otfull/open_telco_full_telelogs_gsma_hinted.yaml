# NON-DEFAULT collapse-gate fallback variant (ot-full). DEVIATES from the
# official GSMA raw-question contract by adding ONE output-format instruction
# line (gold-free). Use only when faithful open_telco_full_telelogs_gsma
# collapses. Comparison variant, NOT GSMA reproduction. Scorer identical (soft).
task: open_telco_full_telelogs_gsma_hinted
dataset_path: GSMA/ot-full
dataset_name: telelogs
output_type: generate_until
training_split: null
validation_split: null
test_split: test
doc_to_text: !function utils.doc_to_text_telelogs_gsma_hinted
doc_to_target: !function utils.doc_to_target_text
process_results: !function utils.process_results_telelogs_gsma
generation_kwargs:
  until: []
  do_sample: false
  temperature: 0.0
  max_gen_toks: 1024
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
metadata:
  version: 0.1
  nfm_track: ot-full
  gsma_aligned: scorer-only-hinted
