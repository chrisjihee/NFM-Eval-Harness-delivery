# LEGACY lm-eval/loglikelihood baseline (renamed from `open_telco_full_telelogs`).
# NOT GSMA-leaderboard-comparable -- diagnostic only. Use the *_gsma profile
# (open_telco_otlite_gsma / open_telco_otfull_gsma) for leaderboard comparison.
task: open_telco_full_telelogs_lm_eval_baseline
dataset_path: GSMA/ot-full
dataset_name: telelogs
output_type: generate_until
training_split: null
validation_split: null
test_split: test
doc_to_text: !function utils.doc_to_text_telelogs
doc_to_target: !function utils.doc_to_target_text
process_results: !function utils.process_results_telelogs
generation_kwargs:
  until:
    - "\n"
  do_sample: false
  temperature: 0.0
  max_gen_toks: 24
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
metadata:
  version: 0.2
  nfm_track: ot-full
  leaderboard_task: telelogs
  task_family: telco_generation
