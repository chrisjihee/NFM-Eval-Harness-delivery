# NON-DEFAULT GSMA-aligned generation variant (scorer-only alignment).
# The scorer mirrors the gsma-evals three_gpp contract; the generation engine
# still differs (lm-eval generate_until vs official Inspect generate). The
# default open_telco_3gpp_tsg_gen task is unchanged.
#
# max_gen_toks=256 is a deliberate scorer-fit/cost choice (scorer reads only
# the first WG token); NOT a parity-loss. Official Inspect leaves max_tokens
# provider-default; cap-hit% measured at smoke.
task: open_telco_3gpp_tsg_gsma
dataset_path: GSMA/ot-lite
dataset_name: 3gpp_tsg
output_type: generate_until
training_split: null
validation_split: null
test_split: test
doc_to_text: !function utils.doc_to_text_3gpp_gsma
doc_to_target: !function utils.doc_to_target_text
process_results: !function utils.process_results_3gpp_gsma
generation_kwargs:
  until: []
  do_sample: false
  temperature: 0.0
  max_gen_toks: 256
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
metadata:
  version: 0.1
  nfm_track: ot-lite
  gsma_aligned: scorer-only
